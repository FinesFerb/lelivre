server {
    listen 8080;  # Render использует переменную PORT, но в контейнере можно просто 8080
    server_name _;
    root /var/www/html/public;
    index index.php;

    # Перенаправление HTTP → HTTPS (если заголовок X-Forwarded-Proto говорит, что клиент использовал http)
    if ($http_x_forwarded_proto = 'http') {
        return 301 https://$host$request_uri;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;

        # 👇 ЭТИ СТРОКИ РЕШАЮТ ПРОБЛЕМУ
        fastcgi_param HTTPS on;                     # Говорит PHP, что соединение HTTPS
        fastcgi_param HTTP_X_FORWARDED_PROTO https; # Явно указываем протокол для Laravel
    }

    location ~ /\.ht {
        deny all;
    }
}